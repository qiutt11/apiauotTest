module: 用户登录
testcases:
  - name: HMC-获取验证码图片
    description: 获取验证码图片
    level: P0
    method: POST
    url: /tms-api/imgVerCode/getLoginImageCode
    headers:
      Content-Type: application/json
    body: {}
    extract:
      codeNum: $.map.imgCodeVO.codeNum
    validate:
      - eq: [$.resultCode, "${resultCode}"]
      - not_null: [$.map.imgCodeVO.codeNum]

  - name: HMC-获取图形验证码
    description: 获取图形验证码
    level: P1
    method: POST
    url: /tms-api/verifyCode/get
    body:
      codeNum: ${codeNum}
      encryptStr: ${encryptStr}
      test: ''
    extract:
      storedCode: $.map.storedCode
    validate:
      - eq: [$.resultCode, "0000"]
      - not_null: [$.map.storedCode]

  - name: HMC-登录
    description: 登录并获取token
    level: P0
    method: POST
    url: /tms-api/user/loginForOA
    headers:
      Content-Type: application/json
    body:
      username: ${HMC_admin}
      password: ${HMC_password}
      verCode: ${storedCode}
      codeNum: ${codeNum}
    extract:
      HMC_token:
        jsonpath: $.map.tmsToken
        scope: global
    validate:
      - eq: [$.resultCode, "0000"]
      - not_null: [$.map.tmsToken]

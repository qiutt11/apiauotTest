# ===========================================================================
# Excel 驱动用例示例
#
# 演示"保存接口 → 查看详情接口"的数据驱动测试模式：
#   - Excel 存储 body 字段数据（字段多、需要逐一比对的场景）
#   - YAML 定义接口调用步骤和断言逻辑
#   - 框架自动按 Excel 每行数据展开为独立用例
#
# 文件结构：
#   testcases/user/
#   ├── user_excel_driven.yaml          ← 本文件（YAML 用例定义）
#   └── data/
#       ├── user_data.xlsx              ← 示例1 的数据（列名=接口字段名）
#       └── user_data_with_mapping.xlsx ← 示例2 的数据（列名≠接口字段名，需映射）
# ===========================================================================

module: 用户管理-Excel驱动

testcases:
  # ------------------------------------------------------------------
  # 普通用例：登录获取 token（与原有逻辑完全一致，不受 Excel 驱动影响）
  # ------------------------------------------------------------------
  - name: 登录获取token
    level: P0
    method: POST
    url: /api/login
    body:
      username: ${admin_user}
      password: ${admin_pass}
    extract:
      token: $.data.token
    validate:
      - eq: [$.code, 0]

  # ------------------------------------------------------------------
  # 示例1：body_from_excel: true（最简场景，Excel 列名 = 接口字段名）
  #
  # Excel 数据（data/user_data.xlsx）：
  #   | name | age | phone       | tags            | address                         |
  #   |------|-----|-------------|-----------------|----------------------------------|
  #   | 张三 | 25  | 13800001111 | ["vip","new"]   | {"city":"北京","street":"xx路"}   |
  #   | 李四 | 30  | 13900002222 | ["normal"]      | {"city":"上海","street":"yy路"}   |
  #
  # 框架行为：
  #   1. 加载 Excel → 2 行数据 → 生成 2 个独立用例
  #   2. 每个用例执行 2 个 step：保存 → 查看详情
  #   3. 报告中显示为：保存并验证用户详情[张三]、保存并验证用户详情[李四]
  # ------------------------------------------------------------------
  - name: 保存并验证用户详情
    level: P0
    excel_source: data/user_data.xlsx       # Excel 路径（相对于本 YAML 文件）
    steps:
      # Step 1: 保存用户
      # body_from_excel: true → Excel 行数据直接作为请求 body
      # 例如张三行 → body = {"name":"张三","age":25,"phone":"13800001111","tags":["vip","new"],"address":{"city":"北京","street":"xx路"}}
      - name: 保存用户
        method: POST
        url: /api/user/save
        headers:
          Authorization: Bearer ${token}
        body_from_excel: true               # 列名直接当字段名
        extract:
          id: $.data.id                     # 提取保存返回的 ID，供下一步使用
        validate:
          - eq: [$.code, 0]

      # Step 2: 查看详情，用 Excel 数据逐字段校验
      # validate_from_excel 会自动将 Excel 行数据递归展开为 eq 断言：
      #   name="张三"              → eq: [$.data.name, "张三"]
      #   age=25                  → eq: [$.data.age, 25]
      #   tags=["vip","new"]      → eq: [$.data.tags[0], "vip"], eq: [$.data.tags[1], "new"]
      #   address={"city":"北京"}  → eq: [$.data.address.city, "北京"], eq: [$.data.address.street, "xx路"]
      - name: 查看用户详情
        method: GET
        url: /api/user/detail/${id}         # 使用上一步提取的 id
        headers:
          Authorization: Bearer ${token}
        validate_from_excel:
          prefix: $.data                    # 详情响应中字段的 JSONPath 前缀
        validate:
          - eq: [$.code, 0]                 # 手写断言保留，Excel 断言追加在后面

  # ------------------------------------------------------------------
  # 示例2：field_mapping（Excel 列名 ≠ 接口字段名时的映射）
  #
  # 场景：Excel 中业务人员用中文列名，接口用英文字段名
  #
  # Excel 数据（data/user_data_with_mapping.xlsx）：
  #   | 姓名 | 年龄 | 手机号      |
  #   |------|------|-------------|
  #   | 王五 | 28   | 13700003333 |
  #
  # YAML 中配置 field_mapping 进行映射：
  #   姓名 → name, 年龄 → age, 手机号 → phone
  # ------------------------------------------------------------------
  - name: 保存并验证用户详情(字段映射)
    level: P1
    excel_source: data/user_data_with_mapping.xlsx
    steps:
      # Step 1: 保存，Excel 列名映射为接口字段名
      # body_from_excel + field_mapping:
      #   姓名=王五 → body 中是 name: 王五
      #   年龄=28   → body 中是 age: 28
      #   手机号=137 → body 中是 phone: 13700003333
      - name: 保存用户(映射)
        method: POST
        url: /api/user/save
        headers:
          Authorization: Bearer ${token}
        body_from_excel:
          field_mapping:
            姓名: name                      # Excel列名: 接口字段名
            年龄: age
            手机号: phone
        extract:
          id: $.data.id
        validate:
          - eq: [$.code, 0]

      # Step 2: 查看详情，用映射后的字段名校验
      # validate_from_excel + field_mapping:
      #   姓名=王五 → 断言 eq: [$.data.user_name, "王五"]（注意：映射到 user_name）
      #   年龄=28   → 断言 eq: [$.data.user_age, 28]
      #   手机号=137 → 断言 eq: [$.data.user_phone, "13700003333"]
      - name: 查看用户详情(映射)
        method: GET
        url: /api/user/detail/${id}
        headers:
          Authorization: Bearer ${token}
        validate_from_excel:
          prefix: $.data
          field_mapping:
            姓名: user_name                 # Excel列名: 响应字段名（可以与保存时不同）
            年龄: user_age
            手机号: user_phone
        validate:
          - eq: [$.code, 0]

  # ------------------------------------------------------------------
  # 示例3：跨系统场景（不同 step 调用不同系统地址）
  #
  # 场景：保存接口在 A 系统，详情接口在 B 系统，地址前缀不同
  # 使用 base_url 字段在 step 级别覆盖全局 base_url
  #
  # 建议：在 config/{env}.yaml 的 global_variables 中配置各系统地址，
  #        用例中通过 ${变量名} 引用，方便环境切换：
  #
  #   # config/test.yaml
  #   global_variables:
  #     system_a_url: https://api-a.test.com
  #     system_b_url: https://api-b.test.com
  #
  #   # config/prod.yaml
  #   global_variables:
  #     system_a_url: https://api-a.prod.com
  #     system_b_url: https://api-b.prod.com
